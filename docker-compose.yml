services:
  app:
    build: .
    # Coolify injects these from its Environment Variables UI.
    # For local dev, create a .env.local file with these values.
    environment:
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
      - MYSQL_URL=${MYSQL_URL}
    env_file:
      - path: .env.local
        required: false
    volumes:
      - syllabus_data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"

volumes:
  syllabus_data:
